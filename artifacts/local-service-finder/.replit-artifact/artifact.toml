kind = "web"
previewPath = "/"
title = "Local Service Finder"
version = "1.0.0"
id = "artifacts/local-service-finder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24469

[services.development]
run = "pnpm --filter @workspace/local-service-finder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/local-service-finder", "run", "build" ]
publicDir = "artifacts/local-service-finder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24469"
BASE_PATH = "/"
