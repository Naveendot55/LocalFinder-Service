openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Local Service Finder API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: services
    description: Service listing operations
  - name: bookings
    description: Booking operations
  - name: reviews
    description: Review operations
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all active services
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create a service listing (provider only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      summary: Get service by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Service details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateService
      tags: [services]
      summary: Update service (provider only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete service (provider only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /services/categories:
    get:
      operationId: listCategories
      tags: [services]
      summary: List all service categories with counts
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySummary"

  /services/featured:
    get:
      operationId: getFeaturedServices
      tags: [services]
      summary: Get top-rated featured services
      responses:
        "200":
          description: Featured services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"

  /provider/services:
    get:
      operationId: getMyServices
      tags: [services]
      summary: Get provider's own services
      responses:
        "200":
          description: Provider's services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"

  /provider/stats:
    get:
      operationId: getProviderStats
      tags: [services]
      summary: Get provider dashboard stats
      responses:
        "200":
          description: Provider stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderStats"

  /bookings:
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking (user only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/user:
    get:
      operationId: getUserBookings
      tags: [bookings]
      summary: Get current user's bookings
      responses:
        "200":
          description: User bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /bookings/provider:
    get:
      operationId: getProviderBookings
      tags: [bookings]
      summary: Get provider's received bookings
      responses:
        "200":
          description: Provider bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    put:
      operationId: updateBookingStatus
      tags: [bookings]
      summary: Update booking status (provider or user)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /reviews:
    post:
      operationId: createReview
      tags: [reviews]
      summary: Create a review (user only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reviews/{serviceId}:
    get:
      operationId: getServiceReviews
      tags: [reviews]
      summary: Get reviews for a service
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform-wide stats for admin dashboard
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: listAllUsers
      tags: [admin]
      summary: List all users (admin only)
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/services:
    get:
      operationId: listAllServices
      tags: [admin]
      summary: List all services including pending (admin only)
      responses:
        "200":
          description: All services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"

  /admin/services/{id}/approve:
    put:
      operationId: approveService
      tags: [admin]
      summary: Approve or reject a service (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceApproval"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [user, provider]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    User:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, provider, admin]
        createdAt:
          type: string
          format: date-time

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    ServiceInput:
      type: object
      required: [title, category, description, price, location]
      properties:
        title:
          type: string
          minLength: 3
        category:
          type: string
        description:
          type: string
        price:
          type: number
        location:
          type: string

    ServiceUpdate:
      type: object
      properties:
        title:
          type: string
        category:
          type: string
        description:
          type: string
        price:
          type: number
        location:
          type: string

    Service:
      type: object
      required: [id, providerId, providerName, title, category, description, price, location, status, rating, reviewCount, createdAt]
      properties:
        id:
          type: integer
        providerId:
          type: integer
        providerName:
          type: string
        title:
          type: string
        category:
          type: string
        description:
          type: string
        price:
          type: number
        location:
          type: string
        status:
          type: string
          enum: [pending, active, rejected]
        rating:
          type: number
        reviewCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    CategorySummary:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
        count:
          type: integer

    ProviderStats:
      type: object
      required: [totalServices, totalBookings, pendingBookings, acceptedBookings, completedBookings, averageRating]
      properties:
        totalServices:
          type: integer
        totalBookings:
          type: integer
        pendingBookings:
          type: integer
        acceptedBookings:
          type: integer
        completedBookings:
          type: integer
        averageRating:
          type: number

    BookingInput:
      type: object
      required: [serviceId]
      properties:
        serviceId:
          type: integer
        notes:
          type: ["string", "null"]

    BookingStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted, rejected, completed]

    Booking:
      type: object
      required: [id, userId, serviceId, providerId, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        serviceId:
          type: integer
        providerId:
          type: integer
        status:
          type: string
          enum: [pending, accepted, rejected, completed]
        notes:
          type: ["string", "null"]
        userName:
          type: string
        serviceName:
          type: string
        serviceCategory:
          type: string
        servicePrice:
          type: number
        providerName:
          type: string
        createdAt:
          type: string
          format: date-time

    ReviewInput:
      type: object
      required: [serviceId, rating, comment]
      properties:
        serviceId:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string

    Review:
      type: object
      required: [id, userId, serviceId, rating, comment, userName, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        serviceId:
          type: integer
        rating:
          type: integer
        comment:
          type: string
        userName:
          type: string
        createdAt:
          type: string
          format: date-time

    AdminStats:
      type: object
      required: [totalUsers, totalProviders, totalServices, totalBookings, pendingServices, pendingBookings]
      properties:
        totalUsers:
          type: integer
        totalProviders:
          type: integer
        totalServices:
          type: integer
        totalBookings:
          type: integer
        pendingServices:
          type: integer
        pendingBookings:
          type: integer

    ServiceApproval:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, rejected]
